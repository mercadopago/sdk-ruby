# Dependabot version updates — sdk-ruby
# Ubicación obligatoria: .github/dependabot.yml
# Ecosistemas: bundler (Ruby) + github-actions
version: 2

updates:
  # ── Ruby / Bundler ───────────────────────────────────────────────────
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Bogota"
    open-pull-requests-limit: 5
    assignees:
      - "mercadopago/backend-sdks"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # bundler puede ejecutar código de gemspec durante el update — lo bloqueamos
    insecure-external-code-execution: "deny"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions (CI) ──────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Bogota"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
