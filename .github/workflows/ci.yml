name: Ruby

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    container: ruby:3.4

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}

    - name: Cache gems
      uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v6
      with:
        path: vendor/bundle
        key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-gems-

    - name: Install dependencies
      run: |
        bundle config set --local path vendor/bundle
        bundle install

    - name: Rubocop
      run: bundle exec rubocop lib

    # Integration tests disabled: they require a valid MercadoPago ACCESS_TOKEN
    # that is not available in the CI environment. To run them locally:
    #   ACCESS_TOKEN=<your_token> bundle exec rake
    # - name: Run tests
    #   run: bundle exec rake
    #   env:
    #     ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN_V2 }}
